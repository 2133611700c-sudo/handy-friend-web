name: Supabase SQL Reports

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/supabase-sql-reports.yml'
      - 'scripts/run-supabase-sql-reports.sh'
      - 'ops/sql/**'

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight DATABASE_URL scheme
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "ERROR: DATABASE_URL is empty. Configure repository secret SUPABASE_DATABASE_URL with a real Postgres DSN." >&2
            exit 1
          fi

          case "$DATABASE_URL" in
            postgres://*|postgresql://*)
              echo "DATABASE_URL scheme validation: PASS"
              ;;
            *)
              echo "ERROR: DATABASE_URL scheme validation: FAIL. Expected postgres:// or postgresql://." >&2
              exit 1
              ;;
          esac

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run SQL reports
        run: bash scripts/run-supabase-sql-reports.sh

      - name: Upload SQL report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-sql-reports
          path: ops/reports/sql/
          if-no-files-found: warn
