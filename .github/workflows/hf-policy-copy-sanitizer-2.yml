name: HF Policy Copy Sanitizer Second Pass

on:
  workflow_dispatch:
  push:
    paths:
      - 'ops/triggers/hf-policy-copy-sanitize-*.txt'

permissions:
  contents: write

jobs:
  sanitize-copy-second-pass:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply remaining policy-safe replacements
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path('index.html'),
              Path('book/index.html'),
              Path('services/index.html'),
              Path('pricing/index.html'),
              Path('assets/js/shared.js'),
          ]

          replacements = {
              # Remaining escaped/newline variants for JSON-LD hours.
              '"closes": "19:00"': '"closes": "20:00"',
              'Mon–Sat 8AM–7PM': 'Mon–Sat 8AM–8PM',
              'Mon-Sat 8AM-7PM': 'Mon-Sat 8AM-8PM',
              'Mon–Sat 8 AM–7 PM': 'Mon–Sat 8 AM–8 PM',

              # Remaining broad service wording.
              'painting, plumbing, electrical & more': 'painting, minor plumbing/electrical fixtures & more',
              'plumbing, electrical & more': 'minor plumbing/electrical fixtures & more',
              'plumbing & electrical': 'minor plumbing/electrical fixtures',
              'Plumbing service in Los Angeles': 'Minor plumbing fixture service in Los Angeles',
              'Electrical service in Los Angeles': 'Minor electrical fixture service in Los Angeles',

              # Shared JS success SLA.
              "We'll get back to you within 30 minutes during business hours.": "We'll get back to you within 15 minutes during business hours.",
              "within 30 minutes during business hours": "within 15 minutes during business hours",

              # Remaining English/Spanish/Russian/Ukrainian insurance variants.
              'fully insured': 'focused on minor handyman scope',
              'totalmente asegurados': 'enfocados en servicios menores',
              'застрахованы': 'работаем по ограниченному handyman scope',
              'застраховані': 'працюємо в межах обмеженого handyman scope',
          }

          changed_files = []
          for path in files:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in replacements.items():
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed_files.append(str(path))

          print('Changed files:')
          for f in changed_files:
              print(f)
          if not changed_files:
              print('(none)')
          PY

      - name: Show diff
        run: git diff -- index.html book/index.html services/index.html pricing/index.html assets/js/shared.js

      - name: Commit second-pass sanitized copy
        run: |
          if git diff --quiet -- index.html book/index.html services/index.html pricing/index.html assets/js/shared.js; then
            echo "No copy changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html book/index.html services/index.html pricing/index.html assets/js/shared.js
          git commit -m "fix(copy): complete policy sanitizer second pass"
          git push
