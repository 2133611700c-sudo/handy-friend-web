name: Ads Daily Check

on:
  schedule:
    # 09:00 America/Los_Angeles ≈ 17:00 UTC during PDT (Mar-Nov).
    # GitHub cron doesn't support TZ, so anchor to PDT offset.
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without sending Telegram alert'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: ads-daily-check-main
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Ads Daily Check
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            unset TELEGRAM_BOT_TOKEN
            unset TELEGRAM_CHAT_ID
            echo "DRY RUN — Telegram disabled"
          fi
          bash scripts/ads_daily_check.sh | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Commit report if changed
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/ads-monitoring/ || true
          if ! git diff --staged --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            MSG="ops(ads): daily check ${DATE}"
            git commit -m "${MSG}" -m "Auto-generated via .github/workflows/ads-daily-check.yml" || true
            git push origin HEAD:main || echo "Push failed (may be branch protected - artifact still available)"
          else
            echo "No changes to commit"
          fi

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ads-daily-check-${{ github.run_id }}
          path: ops/ads-monitoring/*.md
          retention-days: 30
