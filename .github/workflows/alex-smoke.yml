name: Alex Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - 'ops/agent-control/triggers/alex-smoke-*.txt'

permissions:
  contents: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write evidence heartbeat
        run: |
          mkdir -p ops/agent-control/reports/alex-smoke
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="ops/agent-control/reports/alex-smoke/${TS}-heartbeat.md"
          echo "# Alex Smoke Evidence Heartbeat" > "$OUT"
          echo "" >> "$OUT"
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$OUT"
          echo "Commit: ${GITHUB_SHA}" >> "$OUT"
          echo "Result: HEARTBEAT" >> "$OUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/agent-control/reports/alex-smoke
          git commit -m "ops(agent): add Alex heartbeat evidence"
          git push

      - name: Run Alex production smoke
        run: npm run -s smoke:alex
