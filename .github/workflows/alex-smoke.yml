name: Alex Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - 'ops/agent-control/triggers/alex-smoke-*.txt'

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Alex production smoke
        run: npm run -s smoke:alex
