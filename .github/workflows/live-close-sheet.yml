name: Live Close Sheet

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard canonical Vercel project linkage
        run: npm run -s vercel:guard

      - name: Update live close sheet
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run -s close:sheet

      - name: Commit updated sheet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/reports/*-live-close-sheet.md
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: refresh live close sheet $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push
