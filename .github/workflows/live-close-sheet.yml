name: Live Close Sheet

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard canonical Vercel project linkage
        run: npm run -s vercel:guard

      - name: Update live close sheet
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run -s close:sheet

      - name: Commit updated sheet
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORT_FILE="$(ls ops/reports/*-live-close-sheet.md 2>/dev/null | head -n1 || true)"
          if [ -n "${REPORT_FILE}" ] && git check-ignore -q "${REPORT_FILE}"; then
            echo "Live close sheet reports are gitignored by policy; skipping commit."
            exit 0
          fi
          git add ops/reports/*-live-close-sheet.md
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh live close sheet $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}), rebasing..."
            git pull --rebase origin main
          done
          echo "Failed to push after 3 attempts"
          exit 1
