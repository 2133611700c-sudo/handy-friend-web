name: OpenClaw Command Router

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  route-openclaw-command:
    if: |
      github.event.issue.number == 99 &&
      contains(github.event.comment.body, '/openclaw virtual-browser')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_ORIGIN: https://handyandfriend.com
      ROUTES: /,/book,/pricing,/services,/messenger
      OUT_DIR: ops/openclaw/reports/virtual-browser
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install project dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright package and Chromium
        run: |
          npm install --no-save --no-audit --no-fund playwright@latest
          npx playwright install chromium

      - name: Run OpenClaw virtual browser audit
        run: node scripts/openclaw-virtual-browser-audit.mjs

      - name: Upload OpenClaw virtual browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-virtual-browser
          path: ops/openclaw/reports/virtual-browser/
          if-no-files-found: warn

      - name: Comment completion summary
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `OpenClaw virtual-browser command completed with status: ${conclusion}\n\nRun: ${runUrl}\n\nArtifact: openclaw-virtual-browser`
            });
