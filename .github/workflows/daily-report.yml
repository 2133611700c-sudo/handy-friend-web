name: Daily Report

on:
  schedule:
    # 08:00 America/Los_Angeles = 16:00 UTC (PST) / 15:00 UTC (PDT)
    # Use 15:00 UTC (PDT, Mar-Nov) — during PST it fires at 07:00 PT, close enough.
    # GHA cron doesn't support TZ, so pick the summer offset.
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - dry-run
          - smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

concurrency:
  group: daily-report-main
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Guard canonical Vercel project linkage
        run: npm run -s vercel:guard

      - name: Run Daily Report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "dry-run" ]; then
            node scripts/daily-report.mjs --dry-run
          elif [ "$MODE" = "smoke" ]; then
            node scripts/daily-report.mjs --smoke
          else
            node scripts/daily-report.mjs
          fi

      - name: Upload archive
        if: success() && (github.event.inputs.mode == 'full' || github.event.inputs.mode == '')
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: ops/reports/*.md
          retention-days: 90

      - name: Commit archive to repo
        if: success() && (github.event.inputs.mode == 'full' || github.event.inputs.mode == '')
        run: |
          set -euo pipefail
          shopt -s nullglob
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPORTS=(ops/reports/*.md)
          if [ ${#REPORTS[@]} -eq 0 ]; then
            echo "No report markdown files found; skipping commit."
            exit 0
          fi
          git add "${REPORTS[@]}" ':!ops/reports/*-live-close-sheet.md'
          if git diff --staged --quiet; then
            echo "No new reports to commit"
            exit 0
          fi

          git commit -m "chore: daily report $(date -u +%Y-%m-%d)"

          pushed=0
          for attempt in 1 2 3; do
            git pull --rebase origin main || { git rebase --abort || true; }
            if git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "Push attempt ${attempt} failed, retrying..."
            sleep $((attempt * 2))
          done

          if [ "$pushed" -ne 1 ]; then
            echo "Failed to push after retries"
            exit 1
          fi
