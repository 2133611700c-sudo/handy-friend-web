name: Supabase SQL Reports

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/supabase-sql-reports.yml'
      - 'scripts/run-supabase-sql-reports.sh'
      - 'ops/sql/**'

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run SQL reports
        run: bash scripts/run-supabase-sql-reports.sh

      - name: Upload SQL report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-sql-reports
          path: ops/reports/sql/
          if-no-files-found: warn
