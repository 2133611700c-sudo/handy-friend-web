name: Supabase Business Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "37 15 * * *"

concurrency:
  group: supabase-sql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reports:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq

      - name: Run infra gate
        run: bash scripts/check-supabase-infra.sh

      - name: Detect run id
        run: |
          RUN_ID="$(ls -1 ops/reports/sql | tail -n1)"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "RUN_ROOT=ops/reports/sql/${RUN_ID}" >> "$GITHUB_ENV"

      - name: Run schema gate
        run: bash scripts/check-supabase-schema-contract.sh || true

      - name: Run business reports
        id: business
        if: always()
        run: |
          INFRA_STATUS="$(jq -r '.status' "${RUN_ROOT}/infra-gate.json")"
          SCHEMA_STATUS="$(jq -r '.status' "${RUN_ROOT}/schema-contract.json")"
          export INFRA_STATUS SCHEMA_STATUS
          if [ "${INFRA_STATUS}" = "PASS" ] && [ "${SCHEMA_STATUS}" = "PASS" ]; then
            bash scripts/run-supabase-business-reports.sh || true
          else
            mkdir -p "${RUN_ROOT}/business"
            NOW_UTC="$(date -u +%FT%TZ)"
            jq -n \
              --arg run_id "${RUN_ID}" \
              --arg started_at "${NOW_UTC}" \
              --arg completed_at "${NOW_UTC}" \
              --arg reason "business reports skipped because infra/schema did not both PASS" \
              '{
                run_id: $run_id,
                status: "BLOCKED",
                started_at: $started_at,
                completed_at: $completed_at,
                reports_count: 0,
                passed_reports_count: 0,
                failed_reports_count: 0,
                degraded_reports_count: 0,
                reason: $reason
              }' > "${RUN_ROOT}/business/summary.json"
            printf '%s\n' \
              '# Business Reports Summary' \
              '' \
              '- status: `BLOCKED`' \
              '- reason: business reports skipped because infra/schema did not both PASS' \
              > "${RUN_ROOT}/business/summary.md"
          fi

      - name: Build run metadata + final summary
        if: always()
        run: |
          INFRA_STATUS="$(jq -r '.status' "${RUN_ROOT}/infra-gate.json")"
          SCHEMA_STATUS="$(jq -r '.status' "${RUN_ROOT}/schema-contract.json")"
          BUSINESS_STATUS="$(jq -r '.status // "BLOCKED"' "${RUN_ROOT}/business/summary.json" 2>/dev/null || echo BLOCKED)"
          REPORTS_COUNT="$(jq -r '.reports_count // 0' "${RUN_ROOT}/business/summary.json" 2>/dev/null || echo 0)"
          FAILED_REPORTS_COUNT="$(jq -r '.failed_reports_count // 0' "${RUN_ROOT}/business/summary.json" 2>/dev/null || echo 0)"
          STARTED="$(jq -r '.started_at' "${RUN_ROOT}/infra-gate.json")"
          COMPLETED="$(date -u +%FT%TZ)"
          HOST_REDACTED="$(jq -r '.database_host_redacted' "${RUN_ROOT}/infra-gate.json")"

          FINAL_STATUS="PASS"
          if [ "${INFRA_STATUS}" != "PASS" ]; then FINAL_STATUS="${INFRA_STATUS}"; fi
          if [ "${INFRA_STATUS}" = "PASS" ] && [ "${SCHEMA_STATUS}" != "PASS" ]; then FINAL_STATUS="${SCHEMA_STATUS}"; fi
          if [ "${INFRA_STATUS}" = "PASS" ] && [ "${SCHEMA_STATUS}" = "PASS" ]; then FINAL_STATUS="${BUSINESS_STATUS}"; fi

          cat > "${RUN_ROOT}/run-meta.json" <<JSON
          {
            "run_id": "${RUN_ID}",
            "git_sha": "${GITHUB_SHA}",
            "workflow_name": "${GITHUB_WORKFLOW}",
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "started_at": "${STARTED}",
            "completed_at": "${COMPLETED}",
            "status": "${FINAL_STATUS}",
            "database_host_redacted": "${HOST_REDACTED}",
            "reports_count": ${REPORTS_COUNT},
            "failed_reports_count": ${FAILED_REPORTS_COUNT}
          }
          JSON

          {
            echo "# SQL Summary"
            echo
            echo "- status: \`${FINAL_STATUS}\`"
            echo "- run_id: \`${RUN_ID}\`"
            echo "- workflow_run_id: \`${GITHUB_RUN_ID}\`"
            echo "- infra_status: \`${INFRA_STATUS}\`"
            echo "- schema_status: \`${SCHEMA_STATUS}\`"
            echo "- business_status: \`${BUSINESS_STATUS}\`"
            echo "- reports_count: ${REPORTS_COUNT}"
            echo "- failed_reports_count: ${FAILED_REPORTS_COUNT}"
          } > "${RUN_ROOT}/summary.md"

      - name: Build remediation packet
        if: always()
        run: |
          node scripts/build-sql-remediation-packet.mjs "${RUN_ROOT}"

      - name: Build alert draft (throttled placeholder)
        if: always()
        run: |
          mkdir -p "${RUN_ROOT}/alerts"
          STATUS="$(jq -r '.status' "${RUN_ROOT}/run-meta.json")"
          if [ "${STATUS}" = "FAIL" ] || [ "${STATUS}" = "BLOCKED" ] || [ "${STATUS}" = "DEGRADED" ]; then
            cat > "${RUN_ROOT}/alerts/github-issue-comment.md" <<EOF
          SQL reports status: ${STATUS}
          workflow_run_id: ${GITHUB_RUN_ID}
          remediation: ${RUN_ROOT}/REMEDIATION.md
          dedupe_key: ${GITHUB_WORKFLOW}-${STATUS}
          throttle_window_hours: 12
          EOF
          fi

      - name: Upload business artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-business-reports-${{ github.run_id }}
          path: ops/reports/sql/
          retention-days: 30
          if-no-files-found: error

      - name: Enforce final status semantics
        if: always()
        run: |
          STATUS="$(jq -r '.status' "${RUN_ROOT}/run-meta.json")"
          if [ "${STATUS}" = "PASS" ] || [ "${STATUS}" = "DEGRADED" ]; then
            exit 0
          fi
          exit 1
