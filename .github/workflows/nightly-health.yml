name: Nightly Health Monitor

on:
  schedule:
    - cron: '0 15 * * *' # 08:00 America/Los_Angeles during DST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: nightly-health-main
  cancel-in-progress: true

jobs:
  nightly-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Guard canonical Vercel project linkage
        run: npm run -s vercel:guard

      - name: Run nightly readiness audit (no stats secret in CI)
        id: audit
        continue-on-error: true
        run: |
          mkdir -p ops/reports
          bash scripts/audit.sh --skip-stats | tee ops/reports/nightly-health-${{ github.run_id }}.log

      - name: Check migration drift (if Supabase creds available)
        id: migration
        continue-on-error: true
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "[SKIP] Supabase credentials not configured, skipping migration drift check"
            exit 0
          fi
          npx supabase --version || npm install -g supabase
          bash scripts/check-migration-drift.sh | tee ops/reports/migration-drift-${{ github.run_id }}.log

      - name: Build incident dashboard + MTTR snapshot
        id: incidents
        continue-on-error: true
        run: |
          node scripts/incident-dashboard.mjs

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-health-${{ github.run_id }}
          path: |
            ops/reports/nightly-health-${{ github.run_id }}.log
            ops/reports/migration-drift-${{ github.run_id }}.log
            ops/reports/migration-drift-*.md
            ops/reports/incident-dashboard-*.md
            ops/reports/incident-mttr-*.csv

      - name: Create issue on failure
        if: steps.audit.outcome == 'failure' || steps.migration.outcome == 'failure' || steps.incidents.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Nightly health failed — ${new Date().toISOString().slice(0,10)}`;
            const failures = [];
            if ('${{ steps.audit.outcome }}' === 'failure') failures.push('readiness audit');
            if ('${{ steps.migration.outcome }}' === 'failure') failures.push('migration drift check');
            if ('${{ steps.incidents.outcome }}' === 'failure') failures.push('incident dashboard build');
            const body = [
              'Nightly health monitor detected a failure.',
              '',
              `- Failed checks: ${failures.join(', ') || 'unknown'}`,
              `- Workflow run: ${runUrl}`,
              '- Artifact: nightly health log attached to workflow run',
              '',
              'Action required:',
              '1) Open run logs',
              '2) Fix failing checks',
              '3) Re-run workflow_dispatch'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'monitoring', 'incident']
            });

      - name: Fail job if audit failed
        if: steps.audit.outcome == 'failure' || steps.migration.outcome == 'failure' || steps.incidents.outcome == 'failure'
        run: exit 1
